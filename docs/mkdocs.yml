site_name: Coti Privacy on Demand Documentation
site_description: Production documentation for building privacy dApps with the COTI PoD SDK.
repo_name: coti-pod-sdk
repo_url: https://github.com/coti-io/coti-pod-sdk
edit_uri: ""

docs_dir: .
site_dir: ../site

nav:
  - Home: README.md
  - Privacy Decentralized Apps on any EVM chain with COTI PoD: 01-privacy-decentralized-apps-on-any-evm-chain-with-coti-pod.md
  - Showcase: 02-showcase.md
  - Features: 03-features.md
  - Getting started: 04-getting-started.md
  - Writing privacy contracts on Ethereum: 05-writing-privacy-contracts-on-ethereum.md
  - Async execution: 05a-async-execution.md
  - Multi-party Computing library (MpCLib): 05b-multi-party-computing-library-mpclib.md
  - Examples with description: 05c-examples-with-description.md
  - TypeScript integration (UX development): 06-typescript-integration-ux-development.md
  - coti-typescript-sdk: 06a-coti-typescript-sdk.md
  - Encrypt / decrypt: 06b-encrypt-decrypt.md
  - Onboarding account (Account AES key): 06c-onboarding-account-account-aes-key.md
  - Contracts:
      - it/ct/gt data types: contracts/01-it-ct-gt-data-types.md
      - Contract patterns and checklist: contracts/02-contract-patterns-and-checklist.md
      - Request builder and remote calls: contracts/03-request-builder-and-remote-calls.md

theme:
  name: material
  logo: assets/images/coti-logo.svg
  favicon: assets/images/coti-logo.svg
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.expand
    - navigation.sections
    - navigation.top
    - navigation.path
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra_css:
  - assets/stylesheets/extra.css

extra:
  generator: false
